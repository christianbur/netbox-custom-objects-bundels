{% load i18n %}
<span class="nsm-rules-sort-header">
  {% if subtitle %}
  <span class="nsm-rules-sort-label nsm-rules-th-stack">
    <span class="nsm-rules-th-title">{{ title }}</span>
    <span class="nsm-rules-th-subtitle">{{ subtitle }}</span>
  </span>
  {% else %}
  <span class="nsm-rules-sort-label">{{ label }}</span>
  {% endif %}
  <a href="{{ meta.sort_url }}"
     class="nsm-rules-sort-direction{% if meta.sort_active %} is-active is-{{ meta.sort_order }}{% endif %}"
     title="{% if meta.sort_active and meta.sort_order == 'desc' %}{% trans 'Z–A' %}{% elif meta.sort_active %}{% trans 'A–Z' %}{% else %}{% trans 'Sort' %}{% endif %}"
     aria-label="{% if meta.sort_active and meta.sort_order == 'desc' %}{% blocktrans with column=label %}Sort {{ column }} Z–A{% endblocktrans %}{% elif meta.sort_active %}{% blocktrans with column=label %}Sort {{ column }} A–Z{% endblocktrans %}{% else %}{% blocktrans with column=label %}Sort {{ column }}{% endblocktrans %}{% endif %}">
    <i class="mdi{% if meta.sort_active and meta.sort_order == 'desc' %} mdi-arrow-down{% elif meta.sort_active %} mdi-arrow-up{% else %} mdi-unfold-more-vertical{% endif %}"
       aria-hidden="true"></i>
  </a>
</span>
