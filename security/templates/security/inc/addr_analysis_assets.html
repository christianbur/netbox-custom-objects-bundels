{% load i18n %}
<style>
  .nsm-addr-details { margin: 2px 0; }
  .nsm-addr-top { border-bottom: 1px solid var(--bs-border-color); margin-bottom: 4px; padding-bottom: 4px; }
  .nsm-addr-top:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .nsm-addr-summary {
    cursor: pointer; user-select: none;
    padding: 3px 4px; border-radius: 4px;
    font-weight: 500; list-style: none;
    display: flex; align-items: center; gap: 6px;
  }
  .nsm-addr-summary::before { content: "▶"; font-size: .7rem; color: var(--bs-secondary-color); flex-shrink: 0; }
  details[open] > .nsm-addr-summary::before { content: "▼"; }
  .nsm-addr-summary:hover { background: var(--bs-tertiary-bg); }
  .nsm-addr-link { font-size: .9rem; }
  .nsm-addr-count { font-size: .7rem; font-weight: 600; line-height: 1.2; padding: .15rem .4rem; }
  .nsm-addr-diff-in-both,
  .nsm-addr-diff-in-some,
  .nsm-addr-diff-fund { color: var(--bs-warning-text-emphasis, var(--bs-warning, #fd7e14)) !important; }
  .nsm-addr-duplicate { font-size: .68rem; font-weight: 600; line-height: 1.2; padding: .12rem .35rem; text-transform: lowercase; white-space: nowrap; }
  .nsm-addr-duplicate-in { text-transform: none; font-weight: 500; margin-left: .15rem; }
  .nsm-addr-duplicate a:hover { color: var(--bs-warning-text-emphasis, var(--bs-warning)) !important; }
  .badge.nsm-addr-diff { --bs-badge-color: #fff; border: none; }
  .nsm-addr-diff { font-size: .68rem; font-weight: 600; line-height: 1.2; padding: .12rem .35rem; text-transform: lowercase; white-space: nowrap; flex-shrink: 0; color: #fff; }
  .nsm-addr-diff--only_a,
  .nsm-addr-diff--side-a { background-color: var(--bs-primary, #0d6efd); color: #fff; }
  .nsm-addr-diff--only_b,
  .nsm-addr-diff--side-b { background-color: var(--bs-success, #198754); color: #fff; }
  .nsm-addr-diff--both { background-color: var(--bs-secondary, #6c757d); color: #fff; }
  .nsm-addr-diff-leaf--only_a { border-left: 2px solid var(--bs-primary); padding-left: .35rem; }
  .nsm-addr-diff-leaf--only_b { border-left: 2px solid var(--bs-success); padding-left: .35rem; }
  .nsm-addr-diff-leaf--both { border-left: 2px solid var(--bs-secondary); padding-left: .35rem; }
  .nsm-addr-diff-leaf--side-a { border-left: 2px solid var(--bs-primary); padding-left: .35rem; }
  .nsm-addr-diff-leaf--side-b { border-left: 2px solid var(--bs-success); padding-left: .35rem; }
  .nsm-addr-diff-leaf--fund { border-left-color: var(--bs-info); }
  .nsm-addr-diff-intersection-separator {
    border: none;
    border-top: 1px dashed var(--bs-border-color);
    margin: 0.65rem 0;
    opacity: 1;
  }
  .nsm-addr-diff-intersection > .nsm-addr-summary .fw-semibold { font-size: .9rem; }
  .nsm-addr-diff-intersection-children {
    padding-left: 0;
    border-left: none;
    margin: 0;
  }
  .nsm-addr-intersection-flat-row {
    padding: 2px 4px;
    border-top: none;
    margin: 0;
  }
  .nsm-addr-diff-intersection .nsm-addr-intersection-flat-row .nsm-addr-link,
  .nsm-addr-diff-intersection .nsm-addr-intersection-flat-row .nsm-addr-ip,
  .nsm-addr-diff-intersection .nsm-addr-intersection-flat-row .nsm-addr-ipam-short,
  .nsm-addr-diff-intersection .nsm-addr-intersection-flat-row .nsm-addr-duplicate {
    border-top: none;
    margin: 0;
  }
  .nsm-addr-fund { font-size: .68rem; font-weight: 600; line-height: 1.2; padding: .12rem .35rem; white-space: nowrap; flex-shrink: 0; }
  .nsm-addr-diff-leaf--fund { flex-wrap: nowrap; min-height: auto; gap: 0.35rem; }
  .nsm-addr-diff-fund-row { display: inline-flex; align-items: center; gap: 0.35rem; flex-wrap: nowrap; min-height: auto; min-width: 0; }
  .nsm-addr-diff-fund-network { display: inline-flex; align-items: center; flex-shrink: 0; color: var(--bs-secondary-color); font-family: var(--bs-font-monospace, ui-monospace, monospace); font-size: 0.78rem; font-variant-numeric: tabular-nums; line-height: 1.2; padding: 0.08rem 0.35rem; border-radius: 0.25rem; background: var(--bs-secondary-bg); white-space: nowrap; }
  .nsm-addr-diff-fund-network-link { color: inherit; text-decoration: none; }
  .nsm-addr-diff-fund-network-link:hover { text-decoration: underline; }
  .nsm-addr-diff-fund-row .nsm-ipa-diff-name-pill { flex-direction: row; align-items: center; flex-wrap: nowrap; white-space: nowrap; }
  .nsm-addr-diff-fund-row .nsm-addr-fund { flex-shrink: 0; margin: 0; }
  .nsm-addr-diff-group--only-a > .nsm-addr-summary .nsm-addr-link { color: var(--bs-primary-text-emphasis, var(--bs-primary)); }
  .nsm-addr-diff-group--only-b > .nsm-addr-summary .nsm-addr-link { color: var(--bs-success-text-emphasis, var(--bs-success)); }
  .nsm-addr-diff-group--both > .nsm-addr-summary .nsm-addr-link,
  .nsm-addr-diff-group--in-all > .nsm-addr-summary .nsm-addr-link { color: var(--bs-secondary-text-emphasis, var(--bs-secondary)); }
  .nsm-addr-diff-group--in-some > .nsm-addr-summary { align-items: flex-start; flex-wrap: wrap; }
  .nsm-addr-diff-group--in-some > .nsm-addr-summary .nsm-addr-link { color: var(--bs-warning-text-emphasis, var(--bs-warning)); }
  .nsm-addr-diff-in-some-head { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .nsm-addr-diff-present-labels { display: flex; flex-direction: column; padding-left: 0.65rem; }
  .nsm-addr-diff-present-label { color: var(--bs-warning-text-emphasis, var(--bs-warning)); font-weight: 400; font-size: 0.72rem; line-height: 1.25; white-space: normal; }
  .nsm-addr-diff-group--in-some > .nsm-addr-summary .nsm-addr-count,
  .nsm-addr-diff-group--in-some > .nsm-addr-summary .nsm-addr-ipam-short {
    background-color: var(--bs-warning-bg-subtle) !important;
    color: var(--bs-warning-text-emphasis, var(--bs-warning)) !important;
  }
  .nsm-addr-diff-group--in-some > .nsm-addr-children { border-left-color: var(--bs-warning, #fd7e14); }
  .nsm-addr-diff-group--only-side-2 > .nsm-addr-summary .nsm-addr-link { color: var(--bs-info-text-emphasis, var(--bs-info)); }
  .nsm-addr-diff-group--only-side-3 > .nsm-addr-summary .nsm-addr-link { color: var(--bs-danger-text-emphasis, var(--bs-danger)); }
  .nsm-addr-children { padding-left: 1.2rem; border-left: 2px solid var(--bs-border-color); margin: 2px 0 4px 8px; }
  .nsm-addr-leaf { padding: 2px 4px; font-size: .85rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .nsm-addr-ip { font-size: .78rem; }
  .nsm-addr-related {
    font-size: .78rem;
    display: inline-flex;
    align-items: center;
    gap: 0.2rem;
  }
  .nsm-addr-related + .nsm-addr-related::before {
    content: "·";
    color: var(--bs-secondary-color);
    margin: 0 0.15rem;
  }
  .nsm-addr-ipam-short {
    font-size: .68rem;
    font-weight: 600;
    line-height: 1.2;
    padding: .15rem .4rem;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .nsm-addr-info-leaves {
    margin: 0 0 4px 0;
    padding: 2px 4px 4px;
    border-bottom: 1px dashed var(--bs-border-color);
  }
  .nsm-addr-info-leaf {
    font-size: .76rem;
    line-height: 1.35;
    padding: 1px 0;
    display: flex;
    align-items: baseline;
    gap: 0.35rem;
  }
  .nsm-addr-info-link {
    font-weight: 600;
    text-decoration: none;
  }
  .nsm-addr-info-link:hover {
    text-decoration: underline;
  }
  .nsm-addr-category .nsm-addr-summary {
    font-size: .82rem;
    font-weight: 600;
  }
  .nsm-addr-category-empty {
    font-size: .78rem;
    padding: 2px 4px 2px 1.2rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nsm-addr-section-title { font-size: .95rem; font-weight: 600; }
  .nsm-addr-type-title { font-size: .8rem; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--bs-secondary-color); }
  .nsm-addr-prefix-format .btn { font-size: .68rem; line-height: 1.2; min-width: 2.4rem; }
  .nsm-addr-lazy-load--loading { pointer-events: none; opacity: 0.85; }
  .nsm-addr-lazy-progress { max-width: 14rem; }
  .nsm-ipa-subnet-contained { line-height: inherit; }
  .nsm-ipa-addr-drilldown { margin-top: 2px; }
  .nsm-ipa-applet .nsm-ipa-expanded-warnings,
  .nsm-ipa-applet .nsm-ipa-expanded-warning { display: none !important; }
  .nsm-addr-leaf-summary { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .nsm-ipa-diff-name-pill .nsm-ipa-diff-name-a { color: var(--bs-primary); font-weight: 600; text-decoration: none; }
  .nsm-ipa-diff-name-pill .nsm-ipa-diff-name-b { color: var(--bs-success); font-weight: 600; text-decoration: none; }
  .nsm-ipa-diff-name-pill .nsm-ipa-diff-name-a:hover,
  .nsm-ipa-diff-name-pill .nsm-ipa-diff-name-b:hover { text-decoration: underline; }
  .nsm-ipa-diff-name-pill .nsm-ipa-diff-name-sep { color: var(--bs-secondary-color); margin: 0 0.2rem; font-weight: 400; user-select: none; }
  .nsm-ipa-cell-pill {
    display: inline-flex; align-items: center; flex-shrink: 0;
    background: var(--bs-tertiary-bg, #f8f9fa);
    border: 1px solid var(--bs-border-color);
    border-radius: 999px;
    padding: 1px 0.45rem;
    line-height: 1.2;
  }
</style>
<script>
(function () {
  'use strict';
  var currentFormat = 'cidr';

  function getFormat() {
    return currentFormat === 'netmask' ? 'netmask' : 'cidr';
  }

  /** Netmask labels come from Python (``addr_netmask``); JS only toggles display. */
  function prefixNetmaskLabel(el) {
    return el.getAttribute('data-netmask') || '';
  }

  function toggleScopeFromGroup(group) {
    if (!group || !group.closest) {
      return document;
    }
    return (
      group.closest('.nsm-ipa-applet-body') ||
      group.closest('.nsm-addr-top') ||
      group.closest('.nsm-ipa-applet') ||
      document
    );
  }

  function applyFormat(root, format) {
    var scope = root || document;
    scope.querySelectorAll('.nsm-addr-prefix-text').forEach(function (el) {
      var cidr = el.getAttribute('data-cidr') || '';
      var netmask = prefixNetmaskLabel(el);
      el.textContent = format === 'netmask' && netmask ? netmask : cidr;
    });
    scope.querySelectorAll('.nsm-addr-prefix-format-input').forEach(function (input) {
      input.checked = input.value === format;
    });
  }

  function bindToggleGroup(group) {
    if (!group || group.dataset.nsmAddrPrefixBound === '1') {
      return;
    }
    group.dataset.nsmAddrPrefixBound = '1';
    function setFormat(format) {
      currentFormat = format === 'netmask' ? 'netmask' : 'cidr';
      applyFormat(toggleScopeFromGroup(group), format);
      if (window.NsmIpAnalyzerApplet && window.NsmIpAnalyzerApplet.scheduleBodyScale) {
        window.NsmIpAnalyzerApplet.scheduleBodyScale();
      }
    }
    group.querySelectorAll('.nsm-addr-prefix-format-input').forEach(function (input) {
      input.addEventListener('click', function (e) {
        e.stopPropagation();
      });
      input.addEventListener('change', function () {
        if (!input.checked) {
          return;
        }
        setFormat(input.value);
      });
    });
    group.querySelectorAll('label.btn').forEach(function (label) {
      label.addEventListener('click', function (e) {
        e.stopPropagation();
      });
    });
  }

  window.nsmInitAddrPrefixToggle = function (root) {
    var format = getFormat();
    applyFormat(root || document, format);
    (root || document).querySelectorAll('.nsm-addr-prefix-format').forEach(bindToggleGroup);
  };

  document.addEventListener('click', function (e) {
    if (e.target.closest('.nsm-addr-prefix-format')) {
      e.stopPropagation();
    }
  }, true);
  document.addEventListener('mousedown', function (e) {
    if (e.target.closest('.nsm-addr-prefix-format')) {
      e.stopPropagation();
    }
  }, true);

  function categoryApiUrl() {
    return window.NSM_IP_ANALYSIS_CATEGORY_API || '/plugins/custom-objects/bundle-api/security/ip-analysis/category/';
  }

  function objectDrilldownApiUrl() {
    return window.NSM_IP_ANALYSIS_OBJECT_API || '/plugins/custom-objects/bundle-api/security/ip-analysis/object/';
  }

  function mergeBranchHeaders(headers) {
    if (window.NSM_BRANCH_API && window.NSM_BRANCH_API.mergeBranchHeaders) {
      return window.NSM_BRANCH_API.mergeBranchHeaders(headers || {});
    }
    return headers || {};
  }

  function nsmFetchCategory(url, options) {
    if (window.NSM_BRANCH_API && window.NSM_BRANCH_API.fetch) {
      return window.NSM_BRANCH_API.fetch(url, options);
    }
    return fetch(url, options);
  }

  function lazyButtonLabels(btn) {
    return {
      load: btn.getAttribute('data-label-load') || 'Vorschau laden',
      loading: btn.getAttribute('data-label-loading') || 'Laden…',
      retry: btn.getAttribute('data-label-retry') || 'Laden fehlgeschlagen — erneut versuchen',
    };
  }

  function lazyButtonState(btn) {
    var loaded = parseInt(btn.getAttribute('data-loaded') || btn.getAttribute('data-offset') || '0', 10);
    var total = parseInt(btn.getAttribute('data-total') || '0', 10);
    if (!total) {
      var match = (btn.textContent || '').match(/\((\d+)\/(\d+)\)/);
      if (match) {
        loaded = parseInt(match[1], 10);
        total = parseInt(match[2], 10);
      }
    }
    if (isNaN(loaded)) {
      loaded = 0;
    }
    if (isNaN(total)) {
      total = 0;
    }
    return { loaded: loaded, total: total };
  }

  function lazyProgressBar(btn) {
    var bar = btn.parentElement && btn.parentElement.querySelector('.nsm-addr-lazy-progress');
    if (!bar && btn.parentElement) {
      bar = document.createElement('div');
      bar.className = 'progress nsm-addr-lazy-progress mt-1';
      bar.innerHTML = '<div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuemin="0"></div>';
      btn.insertAdjacentElement('afterend', bar);
    }
    return bar;
  }

  function updateLazyProgress(btn, loaded, total, loading) {
    var bar = lazyProgressBar(btn);
    if (!bar) {
      return;
    }
    var inner = bar.querySelector('.progress-bar');
    var pct = total > 0 ? Math.min(100, Math.round((loaded / total) * 100)) : 0;
    if (inner) {
      inner.style.width = pct + '%';
      inner.setAttribute('aria-valuenow', String(loaded));
      inner.setAttribute('aria-valuemax', String(total));
      if (loading) {
        inner.classList.add('progress-bar-striped', 'progress-bar-animated');
      } else {
        inner.classList.remove('progress-bar-striped', 'progress-bar-animated');
      }
    }
    bar.style.display = total > 0 && (loading || loaded < total) ? '' : 'none';
  }

  function setLazyButtonLoading(btn, loaded, total, loading) {
    var labels = lazyButtonLabels(btn);
    btn.disabled = true;
    btn.classList.toggle('nsm-addr-lazy-load--loading', loading);
    if (loading) {
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>' +
        labels.loading + ' (' + loaded + '/' + total + ')';
    } else {
      btn.textContent = labels.load + ' (' + loaded + '/' + total + ')';
    }
    btn.setAttribute('data-loaded', String(loaded));
    btn.setAttribute('data-offset', String(loaded));
    btn.setAttribute('data-total', String(total));
    updateLazyProgress(btn, loaded, total, loading);
  }

  function shouldAutoContinueLazy(category, total) {
    return category !== 'ip_addresses' || total <= 250;
  }

  function fetchLazyCategoryBatch(btn, container, offset) {
    var params = new URLSearchParams({
      offset: String(offset),
    });
    var rangePk = container.getAttribute('data-lazy-range');
    var prefixPk = container.getAttribute('data-lazy-prefix');
    var category = container.getAttribute('data-lazy-category');
    if (rangePk) {
      params.set('range_pk', rangePk);
    } else if (prefixPk && category) {
      params.set('prefix_pk', prefixPk);
      params.set('category', category);
    } else {
      return Promise.reject(new Error('missing lazy context'));
    }
    return nsmFetchCategory(categoryApiUrl() + '?' + params.toString(), {
      headers: mergeBranchHeaders({ 'X-Requested-With': 'XMLHttpRequest' }),
    })
      .then(function (resp) {
        if (!resp.ok) {
          throw new Error('HTTP ' + resp.status);
        }
        return resp.json();
      })
      .then(function (data) {
        btn.insertAdjacentHTML('beforebegin', data.html || '');
        if (window.nsmInitAddrPrefixToggle) {
          window.nsmInitAddrPrefixToggle(container);
        }
        return data;
      });
  }

  function runLazyCategoryLoad(btn) {
    var container = btn.closest('[data-lazy-prefix], [data-lazy-range]');
    if (!container) {
      container = btn.closest('.nsm-addr-children');
    }
    if (!container) {
      return;
    }
    var prefixPk = container.getAttribute('data-lazy-prefix');
    var rangePk = container.getAttribute('data-lazy-range');
    var category = container.getAttribute('data-lazy-category');
    if (!rangePk && !(prefixPk && category)) {
      return;
    }

    var state = lazyButtonState(btn);
    var labels = lazyButtonLabels(btn);

    function loadNext() {
      if (state.loaded >= state.total && state.total > 0) {
        btn.remove();
        updateLazyProgress(btn, state.total, state.total, false);
        return;
      }
      setLazyButtonLoading(btn, state.loaded, state.total, true);
      fetchLazyCategoryBatch(btn, container, state.loaded)
        .then(function (data) {
          state.loaded = parseInt(data.loaded, 10);
          if (isNaN(state.loaded)) {
            state.loaded = parseInt(btn.getAttribute('data-offset') || '0', 10) || 0;
          }
          state.total = parseInt(data.total, 10) || state.total;
          if (data.has_more && shouldAutoContinueLazy(category || 'ip_addresses', state.total)) {
            loadNext();
            return;
          }
          if (data.has_more) {
            setLazyButtonLoading(btn, state.loaded, state.total, false);
            btn.disabled = false;
            btn.classList.remove('nsm-addr-lazy-load--loading');
            updateLazyProgress(btn, state.loaded, state.total, false);
          } else {
            updateLazyProgress(btn, state.total, state.total, false);
            btn.remove();
          }
          if (window.NsmIpAnalyzerApplet && window.NsmIpAnalyzerApplet.scheduleBodyScale) {
            window.NsmIpAnalyzerApplet.scheduleBodyScale();
          }
        })
        .catch(function () {
          btn.disabled = false;
          btn.classList.remove('nsm-addr-lazy-load--loading');
          btn.textContent = labels.retry + ' (' + state.loaded + '/' + state.total + ')';
          updateLazyProgress(btn, state.loaded, state.total, false);
        });
    }

    loadNext();
  }

  document.addEventListener('click', function (e) {
    var btn = e.target.closest('.nsm-addr-lazy-load');
    if (!btn || btn.disabled || btn.classList.contains('nsm-addr-lazy-load--loading')) {
      return;
    }
    e.preventDefault();
    e.stopPropagation();
    runLazyCategoryLoad(btn);
  });

  function fetchObjectDrilldown(container, ct, pk, depth) {
    if (container.getAttribute('data-loaded') === 'loading') {
      return Promise.resolve();
    }
    container.setAttribute('data-loaded', 'loading');
    var loadingEl = container.querySelector('.nsm-ipa-addr-drilldown-loading');
    if (loadingEl) {
      loadingEl.hidden = false;
    }
    var params = new URLSearchParams({
      ct: String(ct),
      pk: String(pk),
      depth: String(depth || 0),
    });
    return nsmFetchCategory(objectDrilldownApiUrl() + '?' + params.toString(), {
      headers: mergeBranchHeaders({ 'X-Requested-With': 'XMLHttpRequest' }),
    })
      .then(function (resp) {
        if (!resp.ok) {
          throw new Error('HTTP ' + resp.status);
        }
        return resp.json();
      })
      .then(function (data) {
        var html = String(data.html || '').trim();
        if (!html) {
          container.hidden = true;
        } else {
          container.insertAdjacentHTML('beforeend', html);
          if (window.nsmIpaStripLegacyExpandedWarnings) {
            window.nsmIpaStripLegacyExpandedWarnings(container.closest('.nsm-addr-children') || container);
          }
          if (window.nsmInitAddrPrefixToggle) {
            window.nsmInitAddrPrefixToggle(container.closest('.nsm-addr-children') || container);
          }
        }
        container.setAttribute('data-loaded', '1');
        if (window.NsmIpAnalyzerApplet && window.NsmIpAnalyzerApplet.scheduleBodyScale) {
          window.NsmIpAnalyzerApplet.scheduleBodyScale();
        }
        return data;
      })
      .finally(function () {
        if (loadingEl) {
          loadingEl.hidden = true;
        }
      });
  }

  function maybeLoadObjectDrilldown(details) {
    if (!details || !details.open) {
      return;
    }
    var container = details.querySelector('.nsm-ipa-addr-drilldown[data-lazy-ct][data-lazy-pk]');
    if (!container) {
      return;
    }
    var loadedState = container.getAttribute('data-loaded');
    if (loadedState === '1' || loadedState === 'loading') {
      return;
    }
    var ct = container.getAttribute('data-lazy-ct');
    var pk = container.getAttribute('data-lazy-pk');
    if (!ct || !pk) {
      return;
    }
    var depth = parseInt(container.getAttribute('data-lazy-depth') || '0', 10);
    fetchObjectDrilldown(container, ct, pk, isNaN(depth) ? 0 : depth).catch(function () {
      container.setAttribute('data-loaded', '0');
    });
  }

  document.addEventListener('toggle', function (e) {
    var details = e.target;
    if (!details || details.tagName !== 'DETAILS') {
      return;
    }
    maybeLoadObjectDrilldown(details);
  }, true);

  function nsmInitOpenIpaDrilldowns(root) {
    var scope = root || document;
    scope.querySelectorAll('details[open]').forEach(function (details) {
      maybeLoadObjectDrilldown(details);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      window.nsmInitAddrPrefixToggle(document);
      nsmInitOpenIpaDrilldowns(document);
    });
  } else {
